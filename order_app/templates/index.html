<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBSync Order Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #F5C842;
      --gold-dim: #C49A1A;
      --black: #0D0D0D;
      --surface: #161616;
      --surface2: #1E1E1E;
      --border: #2A2A2A;
      --text: #E8E8E8;
      --text-muted: #666;
      --red: #FF4444;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: var(--font-mono);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,200,66,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,66,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold-dim);
      padding: 4px 12px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 span {
      color: var(--gold);
    }

    .subtitle {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-bottom: 3rem;
    }

    /* Drop zone */
    .dropzone {
      border: 2px dashed var(--border);
      background: var(--surface);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .dropzone:hover,
    .dropzone.dragover {
      border-color: var(--gold);
      background: var(--surface2);
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .dropzone-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
    }

    .dropzone-label {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
      display: block;
      margin-bottom: 0.5rem;
    }

    .dropzone-hint {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .file-selected {
      margin-top: 1rem;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.03em;
      min-height: 18px;
    }

    .btn-upload {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--gold);
      color: var(--black);
      border: none;
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-upload:hover:not(:disabled) {
      background: #FFD84D;
    }

    .btn-upload:active:not(:disabled) {
      transform: scale(0.99);
    }

    .btn-upload:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Progress / status */
    .status {
      margin-top: 1.2rem;
      font-size: 12px;
      letter-spacing: 0.05em;
      min-height: 20px;
      text-align: center;
    }

    .status.loading { color: var(--text-muted); }
    .status.error   { color: var(--red); }
    .status.success { color: #4ADE80; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--text-muted);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    {% if error %}
    .global-error {
      background: rgba(255,68,68,0.1);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 0.75rem 1rem;
      font-size: 12px;
      margin-bottom: 1.5rem;
      letter-spacing: 0.03em;
    }
    {% endif %}
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Order Receiving Tool</div>
    <h1>ORDER<br><span>CHECK</span></h1>
    <p class="subtitle">Upload an MBSync order proposal PDF to begin receiving</p>

    {% if error %}
    <div class="global-error">⚠ {{ error }}</div>
    {% endif %}

    <div class="dropzone" id="dropzone">
      <input type="file" id="pdfInput" accept=".pdf" />
      <span class="dropzone-icon">📄</span>
      <span class="dropzone-label">Drop PDF here</span>
      <span class="dropzone-hint">or click to browse</span>
    </div>
    <div class="file-selected" id="fileName"></div>

    <button class="btn-upload" id="uploadBtn" disabled>
      Load Order →
    </button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const input    = document.getElementById('pdfInput');
    const btn      = document.getElementById('uploadBtn');
    const status   = document.getElementById('status');
    const fileName = document.getElementById('fileName');
    const dropzone = document.getElementById('dropzone');

    input.addEventListener('change', () => {
      if (input.files[0]) {
        fileName.textContent = '✓ ' + input.files[0].name;
        btn.disabled = false;
      }
    });

    // Drag & drop visual feedback
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) {
        input.files = e.dataTransfer.files;
        fileName.textContent = '✓ ' + e.dataTransfer.files[0].name;
        btn.disabled = false;
      }
    });

    btn.addEventListener('click', async () => {
      if (!input.files[0]) return;

      btn.disabled = true;
      status.className = 'status loading';
      status.innerHTML = '<span class="spinner"></span> Parsing PDF...';

      const form = new FormData();
      form.append('pdf', input.files[0]);

      try {
        const res  = await fetch('/upload', { method: 'POST', body: form });
        const data = await res.json();

        if (data.success) {
          status.className = 'status success';
          status.textContent = `✓ Loaded ${data.item_count} items — redirecting...`;
          setTimeout(() => window.location.href = '/checklist', 600);
        } else {
          status.className = 'status error';
          status.textContent = '✗ ' + (data.error || 'Unknown error');
          btn.disabled = false;
        }
      } catch (err) {
        status.className = 'status error';
        status.textContent = '✗ Upload failed. Check server connection.';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
